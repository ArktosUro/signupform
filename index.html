<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    body {
      display: flex;
      height: 100vh;

      justify-content: center;
      align-items: center;

      background-color: #14213d;
      background-image: url("football.jpg");
      background-size: 710px;
      background-position: right;
      background-repeat: no-repeat;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 500px;

      background-color: #e5e5e5;

      justify-content: center;
      align-items: center;
    }

    @media(max-width: 1400px) {
      body {
        background-color: #14213d;
        background-image: url("football.jpg");
        background-size: 670px;
        background-position: right;
        background-repeat: no-repeat;
      }
    }

    @media(max-width: 920px) {
      body {
        background-color: #14213d;
        background-image: none;
      }
    }

    @media (max-width: 460px) {
      .container {
        display: flex;
        height: 100vh;
        width: 100%;
        background-color: #e5e5e5;
      }

      h1 {
        text-align: center;
      }

      input {
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        font-size: 18px;
      }
    }

    .radio-button-container {
      display: flex;
      width: 42%;
      gap: 20px;
      font-size: 18px;
    }

    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    input {
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    button {
      width: 130px;
      font-size: 16px;
      padding: 5px;
      border-radius: 45%;
      background-color: #fca311;
      border: 3px solid rgb(93, 93, 93);
    }

    button:hover {
      background-color: #fca211b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <form class="form">
      <div id="header">
        <h1>Signup Form Fantasy Football</h1>
      </div>

      <div>
        <div>
          <input id="username" name="username" type="text" placeholder="Username" />
        </div>
      </div>

      <div>
        <div><input id="email" name="email" type="text" placeholder="Email" />
        </div>
      </div>

      <div>
        <div>
          <input id="password" name="password" type="text" placeholder="Confirm email" />
        </div>
      </div>

      <div>
        <div>
          <input id="confirm-password" name="confirm-password" type="text" placeholder="Password" />
        </div>
      </div>

      <div class="radio-button-container">
        <div>
          <input type="radio" id="female" name="sex" value="female" />
          <label for="female">Male</label>
        </div>

        <div>
          <input type="radio" id="male" name="sex" value="male" />
          <label for="male">Female</label>
        </div>
      </div>

      <div>
        <button>Signup</button>
      </div>

    </form>
  </div>
</body>

</html>
